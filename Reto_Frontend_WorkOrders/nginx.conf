server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Redireccionar raíz a /notifications
    location = / {
        return 301 /notifications/;
    }

    # Health check endpoint
    location = /notifications/health-check {
        access_log off;
        add_header Content-Type application/json always;
        return 200 '{"status":"ok","service":"ops-module-work-orders","timestamp":"$time_iso8601"}';
    }

    # Configuración específica para remoteEntry.js (sin cache)
    location = /notifications/remoteEntry.js {
        alias /usr/share/nginx/html/remoteEntry.js;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept";
    }

    # Configuración para archivos estáticos (con cache)
    location /notifications/static {
        alias /usr/share/nginx/html/static;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin *;
    }

    # Configuración para Module Federation con prefijo /notifications (debe ir al final)
    location /notifications/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /notifications/index.html;
        add_header Cache-Control "no-cache";
    }

    # Headers CORS para Module Federation
    add_header Access-Control-Allow-Origin * always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;

    # Manejar preflight requests
    if ($request_method = 'OPTIONS') {
        return 204;
    }

    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
}

